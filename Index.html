<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Uploader</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    label { display: block; margin-top: 12px; }
    input, textarea { width: 100%; box-sizing: border-box; margin-top: 4px; }
    button { margin-top: 16px; }
    #status { margin-top: 16px; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h1>Model Uploader</h1>
  <p>Upload a <code>.rbxm</code> or <code>.rbxmx</code> model file to Roblox via the Open Cloud Assets API.</p>

  <hr>

  <label for="apiKey">Open Cloud API Key</label>
  <input type="password" id="apiKey" placeholder="Your Open Cloud API key">

  <label for="creatorType">Creator Type</label>
  <select id="creatorType">
    <option value="User">User</option>
    <option value="Group">Group</option>
  </select>

  <label for="creatorId">Creator ID (your User ID or Group ID)</label>
  <input type="number" id="creatorId" placeholder="e.g. 12345678">

  <label for="assetName">Asset Name</label>
  <input type="text" id="assetName" placeholder="My Cool Model">

  <label for="assetDescription">Description (optional)</label>
  <textarea id="assetDescription" rows="3" placeholder="A short description of the model"></textarea>

  <label for="modelFile">Model File (.rbxm or .rbxmx)</label>
  <input type="file" id="modelFile" accept=".rbxm,.rbxmx">

  <br>
  <button onclick="uploadModel()">Upload Model</button>

  <div id="status"></div>

  <script>
    async function uploadModel() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const creatorType = document.getElementById('creatorType').value;
      const creatorId = document.getElementById('creatorId').value.trim();
      const assetName = document.getElementById('assetName').value.trim();
      const assetDescription = document.getElementById('assetDescription').value.trim();
      const fileInput = document.getElementById('modelFile');
      const status = document.getElementById('status');

      if (!apiKey || !creatorId || !assetName || !fileInput.files[0]) {
        status.textContent = 'Please fill in all required fields and select a file.';
        return;
      }

      const file = fileInput.files[0];
      const fileName = file.name;
      const isXml = fileName.endsWith('.rbxmx');

      status.textContent = 'Uploading...';

      const formData = new FormData();

      const requestPayload = {
        assetType: 'Model',
        displayName: assetName,
        description: assetDescription,
        creationContext: {
          creator: {
            ...(creatorType === 'User'
              ? { userId: creatorId }
              : { groupId: creatorId })
          }
        }
      };

      formData.append('request', JSON.stringify(requestPayload));
      formData.append('fileContent', file, fileName);

      try {
        const response = await fetch('https://apis.roblox.com/assets/v1/assets', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey
          },
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          status.textContent = 'Error: ' + JSON.stringify(data, null, 2);
          return;
        }

        status.textContent = 'Upload started!\n\nOperation: ' + data.path + '\n\nThe asset may take a moment to process. Check your Roblox inventory/toolbox under "My Packages" once ready.';
      } catch (err) {
        status.textContent = 'Request failed: ' + err.message + '\n\nNote: This page must be served (not opened as a local file) to avoid CORS issues. Try using a local server or hosting it somewhere.';
      }
    }
  </script>

</body>
</html>
